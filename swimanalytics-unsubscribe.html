<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - SwimAnalytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            text-align: left;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .success-message.show {
            display: block;
        }
        
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 14px;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏊‍♂️</div>
        <h1>Unsubscribe from SwimAnalytics</h1>
        <p>We're sorry to see you go! Enter your email address below to unsubscribe from our affiliate program emails.</p>
        
        <form id="unsubscribeForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="coach@example.com" required>
            </div>
            
            <button type="submit" class="btn">Unsubscribe</button>
        </form>
        
        <div id="successMessage" class="success-message">
            ✓ You've been successfully unsubscribed. You won't receive any more emails from us.
        </div>
        
        <div class="footer">
            Changed your mind? <a href="https://swimanalytics.com">Visit SwimAnalytics</a>
        </div>
    </div>
    
    <script>
        document.getElementById('unsubscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const button = this.querySelector('.btn');
            
            // Disable button during submission
            button.disabled = true;
            button.textContent = 'Processing...';
            
            try {
                // Send to Google Form (we'll create this)
                const formData = new FormData();
                formData.append('emailAddress', email);
                formData.append('timestamp', new Date().toISOString());
                
                // Google Form endpoint (placeholder - will be updated after form creation)
                const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse';
                const EMAIL_FIELD_ID = 'entry.YOUR_ENTRY_ID'; // Will be updated
                
                // For now, we'll just simulate success
                // In production, this would post to Google Forms
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Show success message
                document.getElementById('successMessage').classList.add('show');
                this.style.display = 'none';
                
                // Optional: Track unsubscribe in localStorage
                const unsubscribes = JSON.parse(localStorage.getItem('swimanalytics_unsubscribes') || '[]');
                unsubscribes.push({
                    email: email,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('swimanalytics_unsubscribes', JSON.stringify(unsubscribes));
                
            } catch (error) {
                alert('Sorry, there was an error processing your request. Please email us directly at swimanalytics@onmedic.org');
                button.disabled = false;
                button.textContent = 'Unsubscribe';
            }
        });
    </script>
</body>
</html>
